# Spring Boot Application Properties
server.port=8080

# Configure file storage path (relative directory)
inventory.file-storage.dir=data/
inventory.file-name=movements.json

# Multipart configurations for uploading files
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# CORS global configurations for frontend integration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5124
